<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>LinkedIn Post Generator</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --border: #2a2a2a;
      --accent: #4f7cff;
      --accent-dim: #1e2d5e;
      --text: #f0f0f0;
      --text-dim: #888;
      --green: #22c55e;
      --red: #ef4444;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding: 16px;
      padding-bottom: 40px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .header-icon {
      width: 36px;
      height: 36px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .header p {
      font-size: 12px;
      color: var(--text-dim);
    }

    .mode-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      background: var(--surface);
      padding: 4px;
      border-radius: 10px;
    }

    .tab {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.2s;
      background: transparent;
      color: var(--text-dim);
    }

    .tab.active {
      background: var(--accent);
      color: white;
    }

    .mode-panel {
      display: none;
    }

    .mode-panel.active {
      display: block;
    }

    .field-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    textarea, input[type="text"] {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 15px;
      padding: 12px 14px;
      resize: none;
      outline: none;
      font-family: inherit;
      transition: border-color 0.2s;
      margin-bottom: 16px;
    }

    textarea:focus, input[type="text"]:focus {
      border-color: var(--accent);
    }

    textarea {
      min-height: 100px;
    }

    .tone-selector {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .tone-btn {
      padding: 6px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tone-btn.selected {
      border-color: var(--accent);
      background: var(--accent-dim);
      color: var(--accent);
    }

    .generate-btn {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
      margin-bottom: 20px;
    }

    .generate-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .generate-btn:not(:disabled):hover {
      opacity: 0.9;
    }

    .loading {
      display: none;
      text-align: center;
      padding: 30px;
      color: var(--text-dim);
    }

    .loading.show {
      display: block;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .result-box {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-top: 4px;
    }

    .result-box.show {
      display: block;
    }

    .result-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .result-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .char-count {
      font-size: 11px;
      color: var(--text-dim);
    }

    .result-text {
      font-size: 15px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      margin-bottom: 16px;
    }

    .result-actions {
      display: flex;
      gap: 8px;
    }

    .action-btn {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .action-btn.primary {
      background: var(--accent);
      border-color: var(--accent);
    }

    .action-btn:hover {
      opacity: 0.8;
    }

    .copy-toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--green);
      color: white;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
    }

    .copy-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .error-msg {
      background: #1a0a0a;
      border: 1px solid var(--red);
      border-radius: 8px;
      padding: 12px;
      color: var(--red);
      font-size: 13px;
      margin-top: 8px;
      display: none;
    }

    .error-msg.show {
      display: block;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-icon">✍️</div>
    <div>
      <h1>LinkedIn Posts</h1>
      <p>Генератор постов в твоём стиле</p>
    </div>
  </div>

  <div class="mode-tabs">
    <button class="tab active" onclick="switchMode('topic')">По теме</button>
    <button class="tab" onclick="switchMode('thought')">Из мысли</button>
  </div>

  <!-- Режим 1: По теме -->
  <div id="mode-topic" class="mode-panel active">
    <div class="field-label">Тема поста</div>
    <input type="text" id="topic-input" placeholder="Например: second bet conversion, live betting, bonus cost..." />

    <div class="field-label">Тон</div>
    <div class="tone-selector" id="topic-tone">
      <button class="tone-btn selected" data-tone="expert">Экспертный</button>
      <button class="tone-btn" data-tone="story">История</button>
      <button class="tone-btn" data-tone="contrarian">Провокация</button>
    </div>

    <button class="generate-btn" onclick="generate('topic')">Написать пост</button>
  </div>

  <!-- Режим 2: Из мысли -->
  <div id="mode-thought" class="mode-panel">
    <div class="field-label">Твоя сырая мысль</div>
    <textarea id="thought-input" placeholder="Накидай как есть — факт, наблюдение, инсайт, случай из практики..."></textarea>

    <div class="field-label">Тон</div>
    <div class="tone-selector" id="thought-tone">
      <button class="tone-btn selected" data-tone="expert">Экспертный</button>
      <button class="tone-btn" data-tone="story">История</button>
      <button class="tone-btn" data-tone="contrarian">Провокация</button>
    </div>

    <button class="generate-btn" onclick="generate('thought')">Оформить в пост</button>
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div>Пишу пост...</div>
  </div>

  <div class="error-msg" id="error-msg"></div>

  <div class="result-box" id="result-box">
    <div class="result-header">
      <span class="result-label">Готовый пост</span>
      <span class="char-count" id="char-count"></span>
    </div>
    <div class="result-text" id="result-text"></div>
    <div class="result-actions">
      <button class="action-btn" onclick="regenerate()">🔄 Ещё раз</button>
      <button class="action-btn primary" onclick="copyPost()">📋 Копировать</button>
    </div>
  </div>

  <div class="copy-toast" id="copy-toast">Скопировано!</div>

  <script>
    // Init Telegram WebApp
    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.ready();
      tg.expand();
    }

    let currentMode = 'topic';
    let lastGenerated = '';

    const SYSTEM_PROMPT = `Ты ghostwriter для Дмитрия Скакунова — Head of Sportsbook в iGaming индустрии. Пишешь LinkedIn посты строго в его стиле.

ПРИМЕРЫ ЕГО ПОСТОВ:

Пост 1 (история):
"Пришла беда откуда не ждали... 
Начал проседать рейтинг на Chess.com. Немного бьёт по самолюбию даже если часто играешь уставший и просто для удовольствия. Но проигрывать всё равно не люблю.
Параллельно голова забита автоматизацией. Хотелось попробовать ручками, не только ставить задачи команде. И появилась идея объединить это.
Так за 2 часа собрал первого своего Telegram бота: подключил AI, написал промт, структурировал и протестил.
Обычно я заказчик. Сегодня впервые был исполнителем. По-другому смотришь на задачу, когда самому предстоит её делать.
Теперь понимаю, почему команда иногда смотрит на меня странно..."

Пост 2 (экспертный):
"Pragmatic Play закрывает спортсбук... И правильно делают.
Запустили в 2022-м, поработали, посмотрели на результаты — и решили не масштабировать то, в чём не являются лучшими.
Очень часто принято делать наоборот. Оператор запускает спортсбук — потому что "казино есть, а спорт добавить несложно". В итоге куча продуктов, в которых никто не первый.
Быть посредственным в пяти вертикалях хуже, чем быть лучшим в двух.
Спортсбук — это не просто фича, которую можно прикрутить. Это отдельная операционная машина: риск-менеджмент, трейдинг, лимиты, маржа, живые события. Или ты в это инвестируешь всерьёз, или просто создаёшь иллюзию полноты продукта.
Pragmatic выбрали честность перед собой. Редкое качество."

ПРАВИЛА СТИЛЯ:
- Пиши ТОЛЬКО на русском. Никаких английских слов кроме устоявшихся терминов (GGR, NGR, sportsbook, CRM, hold%)
- Короткие абзацы — 1-3 предложения максимум
- Первая строка — зацепка. Провокация, неожиданный факт или ирония. Не вопрос.
- Личный голос, от первого лица
- Конкретика — цифры, кейсы, механики. Никаких абстракций
- Финал острый — вывод с позицией, без смягчений. Не "что думаете?"
- Никакого корпоратива, мотивации, "синергии"
- Длина: 200-400 слов
- Эмодзи — максимум 1-2 и только если уместно

Тоны:
- expert: аналитический, факты + позиция + вывод
- story: личная история или кейс с развязкой
- contrarian: берёшь общепринятое мнение и разбиваешь его

Отвечай ТОЛЬКО текстом поста. Никаких пояснений, заголовков, комментариев.`;

    function switchMode(mode) {
      currentMode = mode;
      document.querySelectorAll('.tab').forEach((t, i) => {
        t.classList.toggle('active', (i === 0 && mode === 'topic') || (i === 1 && mode === 'thought'));
      });
      document.querySelectorAll('.mode-panel').forEach(p => p.classList.remove('active'));
      document.getElementById(`mode-${mode}`).classList.add('active');
      hideResult();
    }

    document.querySelectorAll('.tone-selector').forEach(selector => {
      selector.querySelectorAll('.tone-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          selector.querySelectorAll('.tone-btn').forEach(b => b.classList.remove('selected'));
          btn.classList.add('selected');
        });
      });
    });

    function getSelectedTone(mode) {
      const selector = document.getElementById(`${mode}-tone`);
      return selector.querySelector('.tone-btn.selected')?.dataset.tone || 'expert';
    }

    let lastMode = '';
    let lastInput = '';
    let lastTone = '';

    async function generate(mode) {
      const input = mode === 'topic'
        ? document.getElementById('topic-input').value.trim()
        : document.getElementById('thought-input').value.trim();

      if (!input) {
        showError(mode === 'topic' ? 'Введи тему поста' : 'Накидай мысль');
        return;
      }

      const tone = getSelectedTone(mode);
      lastMode = mode;
      lastInput = input;
      lastTone = tone;

      await callAPI(mode, input, tone);
    }

    async function regenerate() {
      if (lastInput) {
        await callAPI(lastMode, lastInput, lastTone);
      }
    }

    async function callAPI(mode, input, tone) {
      showLoading();
      hideResult();
      hideError();

      const userPrompt = mode === 'topic'
        ? `Напиши LinkedIn пост на тему: "${input}". Тон: ${tone}.`
        : `Оформи в LinkedIn пост эту сырую мысль: "${input}". Тон: ${tone}.`;

      try {
        const response = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt: input, tone, mode })
        });

        const data = await response.json();

        if (!response.ok || data.error) {
          throw new Error(data.error || 'Ошибка API');
        }

        const text = data.text;
        if (!text) throw new Error('Пустой ответ');

        lastGenerated = text;
        showResult(text);

      } catch (err) {
        showError('Ошибка: ' + err.message);
      } finally {
        hideLoading();
      }
    }

    function showResult(text) {
      const box = document.getElementById('result-box');
      document.getElementById('result-text').textContent = text;
      document.getElementById('char-count').textContent = text.length + ' символов';
      box.classList.add('show');
      box.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function hideResult() {
      document.getElementById('result-box').classList.remove('show');
    }

    function showLoading() {
      document.getElementById('loading').classList.add('show');
      document.querySelectorAll('.generate-btn').forEach(b => b.disabled = true);
    }

    function hideLoading() {
      document.getElementById('loading').classList.remove('show');
      document.querySelectorAll('.generate-btn').forEach(b => b.disabled = false);
    }

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.classList.add('show');
    }

    function hideError() {
      document.getElementById('error-msg').classList.remove('show');
    }

    async function copyPost() {
      if (!lastGenerated) return;
      try {
        await navigator.clipboard.writeText(lastGenerated);
        const toast = document.getElementById('copy-toast');
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2000);
      } catch {
        // fallback
        const ta = document.createElement('textarea');
        ta.value = lastGenerated;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        const toast = document.getElementById('copy-toast');
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2000);
      }
    }
  </script>
</body>
</html>
